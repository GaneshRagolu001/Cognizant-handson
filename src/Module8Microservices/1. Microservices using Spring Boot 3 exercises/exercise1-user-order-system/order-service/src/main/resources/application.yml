spring:
  application:
    name: order-service
  datasource:
    url: jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8082

# ── User Service URL (for WebClient inter-service calls) ─────────────────
services:
  user-service:
    url: http://localhost:8081

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics

logging:
  level:
    com.cognizant.orderservice: DEBUG
