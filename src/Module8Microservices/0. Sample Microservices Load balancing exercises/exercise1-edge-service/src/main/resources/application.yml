spring:
  application:
    name: edge-service-gateway

  cloud:
    gateway:
      # ── Route definitions ────────────────────────────────────────────────
      routes:
        # Route 1: forward /example/** → http://example.org
        - id: example_route
          uri: http://example.org
          predicates:
            - Path=/example/**
          filters:
            # Strip the /example prefix before forwarding
            - StripPrefix=1
            # Add a response header to identify this gateway
            - AddResponseHeader=X-Gateway-Source, edge-service-gateway

        # Route 2: forward /httpbin/** → https://httpbin.org (useful for testing)
        - id: httpbin_route
          uri: https://httpbin.org
          predicates:
            - Path=/httpbin/**
          filters:
            - StripPrefix=1
            - AddRequestHeader=X-Gateway-Request-Id, edge-svc-001

      # Global CORS configuration
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE

# ── Server config ────────────────────────────────────────────────────────
server:
  port: 8080

# ── Actuator – expose gateway-specific endpoints ─────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: gateway, health, info
  endpoint:
    gateway:
      enabled: true

# ── Logging ───────────────────────────────────────────────────────────────
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.cognizant.edgeservice: DEBUG
    reactor.netty: INFO
